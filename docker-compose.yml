services:

  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - "8384:8384"        # Web-UI (nur für Erstkonfiguration)
      - "22000:22000"      # Sync TCP
      - "22000:22000/udp"
      - "21027:21027/udp"  # Discovery
    volumes:
      - ./syncthing/config:/var/syncthing/config
      - ./syncthing/data:/data
    networks:
      - docling-net

  docling-serve:
    image: quay.io/docling-project/docling-serve:latest
    container_name: docling-serve
    restart: unless-stopped
    environment:
      - DOCLING_SERVE_NUM_WORKERS=2
      - DOCLING_SERVE_MAX_SYNC_WAIT=600
    ports:
      - "5001:5001"            # OCR API (Wilson + externe Zugriffe)
    volumes:
      - ./docling-cache:/home/docling/.cache
    networks:
      - docling-net

  dispatcher:
    build: ./dispatcher
    container_name: document-dispatcher
    restart: unless-stopped
    environment:
      - WATCH_DIR=/data/input-dispatcher
      - TEMP_DIR=/data/dispatcher-temp
      - CONFIG_FILE=/config/categories.yaml
      - DOCLING_URL=http://docling-serve:5001
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-8192}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - DISABLE_TELEGRAM_POLL=1
      - VAULT_PDF_ARCHIV=/data/reinhards-vault/Anlagen
      - VAULT_ROOT=/data/reinhards-vault
      - VAULT_PATH=/data/reinhards-vault
      - DB_PATH=/data/dispatcher-temp/dispatcher.db
      - ENEX_TAGS_CONFIG=/config/enex-tags.yaml
      - ENEX_DEFAULT_TIMEZONE=Europe/Rome
      - API_PORT=8765
      - HOST_IP=${HOST_IP:-192.168.86.195}
      - CACHE_READER_URL=http://cache-reader:8501
      - TZ=Europe/Rome
    ports:
      - "8765:8765"
    volumes:
      - ./syncthing/data/input-dispatcher:/data/input-dispatcher
      - ./dispatcher-temp:/data/dispatcher-temp
      - ./dispatcher-config:/config
      - ./syncthing/data/reinhards-vault:/data/reinhards-vault
      - /home/reinhard/.local/bin/enzyme:/usr/local/bin/enzyme:ro
      - /home/reinhard/.ssh/id_ed25519:/ssh/id_ed25519:ro
    networks:
      - docling-net
      - ollama-net
    depends_on:
      - docling-serve

  cache-reader:
    build: ./cache-reader
    container_name: cache-reader
    restart: unless-stopped
    environment:
      - CACHE_DIR=/vault-cache
      - INDEX_DB=/data/index.db
      - HTTP_PORT=8501
      - LOG_LEVEL=info
      - TZ=Europe/Rome
    ports:
      - "8501:8501"
    volumes:
      - ./syncthing/data/reinhards-vault/.obsidian/plugins/text-extractor/cache:/vault-cache:ro
      - ./cache-reader/data:/data
    networks:
      - docling-net

networks:
  docling-net:
    name: docling-net
  ollama-net:
    external: true
    name: ollama-net
