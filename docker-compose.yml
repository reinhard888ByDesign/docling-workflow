services:

  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - "8384:8384"        # Web-UI (nur für Erstkonfiguration)
      - "22000:22000"      # Sync TCP
      - "22000:22000/udp"
      - "21027:21027/udp"  # Discovery
    volumes:
      - ./syncthing/config:/var/syncthing/config
      - ./syncthing/data:/data
    networks:
      - docling-net

  docling-serve:
    build:
      context: .
      dockerfile: tessdata.Dockerfile
    container_name: docling-serve
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 10G
    environment:
      - DOCLING_SERVE_NUM_WORKERS=2
      - DOCLING_SERVE_MAX_SYNC_WAIT=600
    ports:
      - "5001:5001"            # OCR API (Wilson + externe Zugriffe)
    volumes:
      - ./docling-cache:/home/docling/.cache
    networks:
      - docling-net

  dispatcher:
    build: ./dispatcher
    container_name: document-dispatcher
    restart: unless-stopped
    environment:
      - WATCH_DIR=/data/input-dispatcher
      - TEMP_DIR=/data/dispatcher-temp
      - CONFIG_FILE=/config/categories.yaml
      - DOCLING_URL=http://docling-serve:5001
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:4b-instruct}
      - FALLBACK_MODEL=${FALLBACK_MODEL:-gemma4:e4b}
      - FALLBACK_TIMEOUT=${FALLBACK_TIMEOUT:-600}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-8192}
      - SUMMARIZE_MODEL=${SUMMARIZE_MODEL:-qwen3:4b-instruct}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - DISABLE_TELEGRAM_POLL=0
      - REVIEW_MODE=on
      - VAULT_PDF_ARCHIV=/data/reinhards-vault/Anlagen
      - VAULT_ROOT=/data/reinhards-vault
      - VAULT_PATH=/data/reinhards-vault
      - DB_PATH=/data/dispatcher-temp/dispatcher.db
      - API_PORT=8765
      - SIDECAR_GRACE_SEC=30
      - HOST_IP=${HOST_IP:-192.168.86.195}
      - CACHE_READER_URL=http://cache-reader:8501
      - OFFICE_CONVERTER_URL=http://office-converter:8502
      - KK_DB_PATH=/data/kv-skill/kk_leistungen.db
      - KK_EXTRACT_MODEL=qwen3:4b-instruct
      - IMMO_DB_PATH=/data/immobilien/immobilien.db
      - IMMO_EXTRACT_MODEL=qwen3:4b-instruct
      - KFZ_DB_PATH=/data/kfz/kfz.db
      - KFZ_EXTRACT_MODEL=qwen3:4b-instruct
      - AV_DB_PATH=/data/altersvorsorge/altersvorsorge.db
      - AV_EXTRACT_MODEL=qwen3:4b-instruct
      - SV_DB_PATH=/data/sachversicherungen/sachversicherungen.db
      - SV_EXTRACT_MODEL=qwen3:4b-instruct
      - TZ=Europe/Rome
    ports:
      - "8765:8765"
    volumes:
      - ./dispatcher/dispatcher.py:/app/dispatcher.py:ro  # Volume-Mount: kein Rebuild nötig
      - ./syncthing/data/input-dispatcher:/data/input-dispatcher
      - ./dispatcher-temp:/data/dispatcher-temp
      - ./dispatcher-config:/config
      - ./syncthing/data/reinhards-vault:/data/reinhards-vault
      - /home/reinhard/.local/bin/enzyme:/usr/local/bin/enzyme:ro
      - /home/reinhard/.ssh/id_ed25519:/ssh/id_ed25519:ro
      - /home/reinhard/.claude/skills/leistungsabrechnung:/data/kv-skill
      - /home/reinhard/.claude/skills/immobilien:/data/immobilien
      - /home/reinhard/.claude/skills/kfz:/data/kfz
      - /home/reinhard/.claude/skills/altersvorsorge:/data/altersvorsorge
      - /home/reinhard/.claude/skills/sachversicherungen:/data/sachversicherungen
    networks:
      - docling-net
      - ollama-net
    extra_hosts:
      - "ollama:host-gateway"
    depends_on:
      - docling-serve

  wilson-sender-proxy:
    image: nginx:alpine
    container_name: wilson-sender-proxy
    restart: unless-stopped
    ports:
      - "8771:8771"
    volumes:
      - ./wilson/nginx-sender.conf:/etc/nginx/conf.d/sender.conf:ro
    networks:
      - docling-net

  cache-reader:
    build: ./cache-reader
    container_name: cache-reader
    restart: unless-stopped
    environment:
      - CACHE_DIR=/vault-cache
      - INDEX_DB=/data/index.db
      - HTTP_PORT=8501
      - LOG_LEVEL=info
      - TZ=Europe/Rome
    ports:
      - "8501:8501"
    volumes:
      - ./syncthing/data/reinhards-vault/.obsidian/plugins/text-extractor/cache:/vault-cache:ro
      - ./cache-reader/data:/data
    networks:
      - docling-net

  office-converter:
    build: ./office-converter
    container_name: office-converter
    restart: unless-stopped
    environment:
      - INPUT_DIR=/data/input
      - OUTPUT_DIR=/data/output
      - VAULT_ANLAGEN=/vault-anlagen
      - HTTP_PORT=8502
      - TZ=Europe/Rome
    ports:
      - "8502:8502"
    volumes:
      - ./office-converter/data/input:/data/input
      - ./office-converter/data/output:/data/output
      - ./syncthing/data/reinhards-vault/Anlagen:/vault-anlagen:ro
    networks:
      - docling-net

networks:
  docling-net:
    name: docling-net
  ollama-net:
    external: true
    name: ollama-net
