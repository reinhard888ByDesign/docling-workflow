    Sanitär, Dachdecker, Maurer, Gartenbau, Asbest-/Schadstoffsanierung (IT: Ecologia,
    Bonifica, Fognaria, Servizi Ecologici, Manutenzione edile, Caldaia, Termico, Riscaldamento)
