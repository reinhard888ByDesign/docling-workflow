# ── Branchen-Regeln ───────────────────────────────────────────────────────────
branchen_regeln:
  - beschreibung: >
      Handwerker, Bausanierung, Abwasser, Kläranlage, Heizung, Elektrik, Sanitär,
      Dachdecker, Maurer, Gartenbau, Asbest-/Schadstoffsanierung (IT: Ecologia, Bonifica,
      Fognaria, Servizi Ecologici, Manutenzione edile) — Leistung ist Wartung/Reparatur/
      Sanierung an einem Gebäude oder Grundstück.
    absender_keywords:
      - Handwerker
      - Sanitär
      - Heizung
      - Elektrik
      - Dachdecker
      - Maurer
      - Gartenbau
      - Schadstoffsanierung
      - Ecologia
      - Bonifica
      - Fognaria
      - Manutenzione edile
      - Servizi Ecologici
      - Bausanierung
      - Abwasser
    category_id: immobilien_eigen
    hinweis: >
      Bei expliziter Erwähnung eines Mietobjekts (z.B. Bremen, Schechen, Karlsruhe,
      Neuburg, München) stattdessen category_id="immobilien_vermietet".

# ── Keyword-Override-Regeln ───────────────────────────────────────────────────
# Laufen NACH dem LLM. Wenn ANY keyword im Dokumenttext gefunden wird, wird
# die Klassifikation überschrieben. Konfidenz wird auf "hoch" gesetzt.
# keywords: Liste von Strings (case-insensitiv, Teilstring-Match)
# alle_keywords: falls true, müssen ALLE keywords vorhanden sein (AND)
keyword_rules:
  - keywords: ["Darlehensvertrag", "Kreditvertrag", "Annuitätendarlehen",
               "Darlehensnehmer", "Nettokreditbetrag", "Tilgungsplan",
               "Baufinanzierung", "Immobilienkredit"]
    category_id: finanzen
    beschreibung: "Darlehen / Kredit"

  - keywords: ["Reservierungsbestätigung", "Buchungsbestätigung", "Booking Confirmation",
               "Reservation Confirmation", "sembo", "Booking.com", "hotels.com",
               "Expedia", "HRS ", "Check-in", "Check-out", "Agriturismo",
               "Albergo", "nights stay", "Übernachtungen"]
    category_id: reisen
    beschreibung: "Hotel-Reservierung / Buchungsbestätigung"

  - keywords: ["Bordkarte", "Boarding Pass", "E-Ticket Flug", "Flugschein",
               "Qatar Airways", "Lufthansa", "Ryanair", "EasyJet", "Emirates",
               "Condor", "TUIfly", "Gate ", "Flight Number", "Flugnummer"]
    category_id: reisen
    beschreibung: "Flug / Bordkarte"

  - keywords: ["Mietvertrag", "Mietzins", "Kaltmiete", "Warmmiete",
               "Mieter", "Vermieter", "Mietbeginn", "Mietzeit"]
    category_id: immobilien_vermietet
    beschreibung: "Mietvertrag"

  - keywords: ["Gehaltsabrechnung", "Lohnabrechnung", "Bruttolohn", "Nettolohn",
               "Sozialversicherung", "Lohnsteuer", "Arbeitnehmerin", "Arbeitnehmer"]
    category_id: business
    beschreibung: "Gehaltsabrechnung"

  - keywords: ["Steuerbescheid", "Einkommensteuerbescheid", "Grundsteuerbescheid",
               "Finanzamt", "Festsetzung", "zu zahlende Steuer", "Steuererstattung",
               "Agenzia delle Entrate", "IMU ", "TARI "]
    category_id: finanzen
    beschreibung: "Steuerbescheid"

  - keywords: ["Kaufvertrag", "Grundbuchauszug", "Katasterauszug", "Notariell",
               "Notar", "Rogito", "Visura Catastale", "Baugenehmigung"]
    category_id: immobilien_eigen
    beschreibung: "Immobilien Kaufvertrag / Grundbuch"

  - keywords: ["Kontoauszug", "Kontoabschluss", "Umsatzübersicht",
               "Estratto conto", "Girokonto", "Bankabschluss"]
    category_id: finanzen
    beschreibung: "Kontoauszug"

  - keywords: ["Leistungsabrechnung", "haben abgerechnet", "Erstattungsbetrag",
               "Erstattung", "Einreichung", "eingereichte Belege",
               "HUK-COBURG", "HUK COBURG", "Gothaer Krankenversicherung",
               "Barmenia Krankenversicherung", "vigo Krankenversicherung"]
    category_id: krankenversicherung
    beschreibung: "Krankenversicherung Leistungsabrechnung"

  - keywords: ["NÜRNBERGER", "Nürnberger Lebensversicherung", "Nürnberger Versicherung",
               "Nürnberger Rentenversicherung", "NÜRNBERGER Versicherung",
               "Bezügeabrechnung"]
    category_id: finanzen
    beschreibung: "Nürnberger Versicherung / Rentenversicherung"

  - keywords: ["Tierarzt", "Tierklinik", "Veterinär", "Veterinaria",
               "Clinica Veterinaria", "Tierheilpraktiker"]
    category_id: familie
    beschreibung: "Tierarzt / Tierklinik"

  - keywords: ["Polizia Stradale", "POLIZIA DI STATO", "Sottosezione Polizia",
               "Ufficio Infortunistica", "sinistro stradale", "verbale di incidente",
               "incidente stradale", "codice della strada", "cds"]
    category_id: fahrzeuge
    beschreibung: "Polizia Stradale / Verkehrsunfall"
