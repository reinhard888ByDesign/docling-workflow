# ── Branchen-Regeln ───────────────────────────────────────────────────────────
branchen_regeln:
  - beschreibung: >
      Handwerker, Bausanierung, Abwasser, Kläranlage, Heizung, Elektrik, Sanitär,
      Dachdecker, Maurer, Gartenbau, Asbest-/Schadstoffsanierung (IT: Ecologia, Bonifica,
      Fognaria, Servizi Ecologici, Manutenzione edile) — Leistung ist Wartung/Reparatur/
      Sanierung an einem Gebäude oder Grundstück.
    absender_keywords:
      - Handwerker
      - Sanitär
      - Heizung
      - Elektrik
      - Dachdecker
      - Maurer
      - Gartenbau
      - Schadstoffsanierung
      - Ecologia
      - Bonifica
      - Fognaria
      - Manutenzione edile
      - Servizi Ecologici
      - Bausanierung
      - Abwasser
    category_id: immobilien
    hinweis: >
      Gilt für alle Immobilien-Dokumente (eigen und vermietet).

# ── Keyword-Override-Regeln ───────────────────────────────────────────────────
# Laufen NACH dem LLM. Wenn ANY keyword im Dokumenttext gefunden wird, wird
# die Klassifikation überschrieben. Konfidenz wird auf "hoch" gesetzt.
# keywords: Liste von Strings (case-insensitiv, Teilstring-Match)
# alle_keywords: falls true, müssen ALLE keywords vorhanden sein (AND)
keyword_rules:
  - keywords: ["Darlehensvertrag", "Kreditvertrag", "Annuitätendarlehen",
               "Darlehensnehmer", "Nettokreditbetrag", "Tilgungsplan",
               "Baufinanzierung", "Immobilienkredit"]
    category_id: finanzen
    beschreibung: "Darlehen / Kredit"

  - keywords: ["Reservierungsbestätigung", "Buchungsbestätigung", "Booking Confirmation",
               "Reservation Confirmation", "sembo", "Booking.com", "hotels.com",
               "Expedia", "HRS ", "Check-in", "Check-out", "Agriturismo",
               "Albergo", "nights stay", "Übernachtungen"]
    category_id: reisen
    beschreibung: "Hotel-Reservierung / Buchungsbestätigung"

  - keywords: ["Bordkarte", "Boarding Pass", "E-Ticket Flug", "Flugschein",
               "Qatar Airways", "Lufthansa", "Ryanair", "EasyJet", "Emirates",
               "Condor", "TUIfly", "Gate ", "Flight Number", "Flugnummer"]
    category_id: reisen
    beschreibung: "Flug / Bordkarte"

  - keywords: ["Mietvertrag", "Mietzins", "Kaltmiete", "Warmmiete",
               "Mieter", "Vermieter", "Mietbeginn", "Mietzeit"]
    category_id: immobilien
    beschreibung: "Mietvertrag"

  - keywords: ["Gehaltsabrechnung", "Lohnabrechnung", "Bruttolohn", "Nettolohn",
               "Sozialversicherung", "Lohnsteuer", "Arbeitnehmerin", "Arbeitnehmer"]
