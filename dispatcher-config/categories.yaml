# ── Special Groups ────────────────────────────────────────────────────────────
# Gruppen von type_ids die im Dispatcher-Code besondere Behandlung erfahren.
# telegram_template: leistungsabrechnung → zeigt Rechnungsmatching-Tabelle
# telegram_template: standard           → normaler Telegram-Output
# Diese Gruppen werden beim Start aus dem YAML geladen (ersetzt LEISTUNGSABRECHNUNG_TYPES
# und VERSICHERUNG_TYPES als Python-Hardcodes).
special_groups:
  leistungsabrechnung:
    - leistungsabrechnung
  versicherung_dokument:
    - versicherungsschein
    - beitragsanpassung
    - beitragsbescheinigung
    - kostenuebernahme
    - versicherungsbedingungen
    - versicherungskorrespondenz

# ── Branchen-Regeln ───────────────────────────────────────────────────────────
branchen_regeln:
  - beschreibung: >
      Handwerker, Bausanierung, Abwasser, Kläranlage, Heizung, Elektrik, Sanitär,
      Dachdecker, Maurer, Gartenbau, Asbest-/Schadstoffsanierung (IT: Ecologia, Bonifica,
      Fognaria, Servizi Ecologici, Manutenzione edile) — Leistung ist Wartung/Reparatur/
      Sanierung an einem Gebäude oder Grundstück.
    absender_keywords:
      - Handwerker
      - Sanitär
      - Heizung
      - Elektrik
      - Dachdecker
      - Maurer
      - Gartenbau
      - Schadstoffsanierung
      - Ecologia
      - Bonifica
      - Fognaria
      - Manutenzione edile
      - Servizi Ecologici
      - Bausanierung
      - Abwasser
    category_id: immobilien_eigen
    type_id: rechnung
    hinweis: >
      Bei expliziter Erwähnung eines Mietobjekts (z.B. Bremen, Schechen, Karlsruhe,
      Neuburg, München) stattdessen category_id="immobilien_vermietet".
